services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: webhook
      POSTGRES_PASSWORD: webhook
      POSTGRES_DB: webhook_ingestion
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webhook -d webhook_ingestion"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://webhook:webhook@postgres:5432/webhook_ingestion
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  ingest-worker:
    build: .
    command: python -m app.workers.ingest_worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://webhook:webhook@postgres:5432/webhook_ingestion
    depends_on:
      postgres:
        condition: service_healthy

  normalization-worker:
    build: .
    command: python -m app.workers.normalization_worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://webhook:webhook@postgres:5432/webhook_ingestion
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
